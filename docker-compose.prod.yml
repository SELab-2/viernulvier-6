services:
  backend:
    image: kayasem/viernulvier:latest
    container_name: backend_archief
    restart: always
    environment:
      DATABASE_URL: postgres://dev_archief:supersecurepassword@database:5432/archief
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_archief
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
    ports:
      - "3001:3000"
    networks:
      - app_network

networks:
  app_network:
    external: true

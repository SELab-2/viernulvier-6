name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: self-hosted
    environment: preview

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check Docker availability
        run: |
          echo "Checking Docker..."
          docker info
          docker compose version

      - name: Generate env files (composite action)
        uses: ./.github/actions/generate-preview-env
        with:
          pr_number: ${{ github.event.pull_request.number }}
          project_name: ${{ vars.PROJECT_NAME }}
          preview_host: ${{ vars.PREVIEW_HOST }}
          db_user: ${{ secrets.PREVIEW_DB_USER }}
          db_password: ${{ secrets.PREVIEW_DB_PASSWORD }}
          db_name: ${{ secrets.PREVIEW_DB_NAME }}
          public_site_url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          garage_rpc_secret: ${{ secrets.GARAGE_RPC_SECRET }}
          garage_s3_access_key: ${{ secrets.GARAGE_S3_ACCESS_KEY }}
          garage_s3_secret_key: ${{ secrets.GARAGE_S3_SECRET_KEY }}
          garage_s3_bucket: media

      - name: Ensure Traefik network exists
        run: docker network inspect traefik >/dev/null 2>&1 || docker network create traefik

      - name: Ensure preview Traefik is running
        run: |
          if [ -z "$(docker ps -q -f name=traefik_preview)" ]; then
            docker compose -f infra/traefik/docker-compose.yml up -d
          fi

      - name: Start preview stack
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview \
            -f infra/preview/docker-compose.preview.yml up -d --build --force-recreate

      - name: Wait for services to be healthy
        run: |
          cd infra/preview

          FAILED=0

          wait_for_service() {
            local service=$1
            local max_attempts=${2:-30}
            local env_files=$3
            local compose_file=${4:-docker-compose.preview.yml}

            for i in $(seq 1 $max_attempts); do
              if docker compose $env_files -f "$compose_file" ps "$service" | grep -q "healthy"; then
                echo "$service is healthy"
                return 0
              fi
              if [ "$i" -eq "$max_attempts" ]; then
                echo "$service failed to become healthy"
                FAILED=1
                return 1
              fi
              echo "Waiting for $service... ($i/$max_attempts)"
              sleep 2
            done
          }

          wait_for_service "db" 30 "--env-file ../../.env --env-file .env.preview"
          wait_for_service "api" 30 "--env-file ../../.env --env-file .env.preview"
          wait_for_service "frontend" 30 "--env-file ../../.env --env-file .env.preview"

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "One or more services failed to become healthy"
            echo ""
            echo "Current container status:"
            docker compose --env-file ../../.env --env-file .env.preview -f docker-compose.preview.yml ps
            echo ""
            echo "Container logs:"
            docker compose --env-file ../../.env --env-file .env.preview -f docker-compose.preview.yml logs --tail 50
            exit 1
          fi

          echo "All services are ready"

      - name: Comment preview links (replace previous)
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ vars.PREVIEW_HOST }}
        with:
          script: |
            const marker = "<!-- preview-env -->";
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${process.env.PREVIEW_HOST}/pr-${prNumber}`;
            const apiUrl = `${previewUrl}/api`;

            // 1. Fetch all comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // 2. Delete previous preview comments (if any)
            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            // 3. Create fresh preview comment
            const body =
              marker +
              "\n## Preview Environment \n\n" +
              "- Frontend: [Open Preview](" + previewUrl + ")\n" +
              "- API: [Open API](" + apiUrl + ")\n";

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: self-hosted
    environment: preview
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate env files (composite action)
        uses: ./.github/actions/generate-preview-env
        with:
          pr_number: ${{ github.event.pull_request.number }}
          project_name: ${{ vars.PROJECT_NAME }}
          preview_host: ${{ vars.PREVIEW_HOST }}
          db_user: ${{ secrets.PREVIEW_DB_USER }}
          db_password: ${{ secrets.PREVIEW_DB_PASSWORD }}
          db_name: ${{ secrets.PREVIEW_DB_NAME }}
          public_site_url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          garage_rpc_secret: ${{ secrets.GARAGE_RPC_SECRET }}
          garage_s3_access_key: ${{ secrets.GARAGE_S3_ACCESS_KEY }}
          garage_s3_secret_key: ${{ secrets.GARAGE_S3_SECRET_KEY }}
          garage_s3_bucket: media

      - name: Cleanup preview stack
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview \
            -f infra/preview/docker-compose.preview.yml down -v || true
          rm -f infra/preview/.env.preview
          rm -f .env
          echo "Preview stack stopped."

      - name: Comment preview stopped
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ vars.PREVIEW_HOST }}
        with:
          script: |
            const marker = "<!-- preview-env -->";
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `http://${process.env.PREVIEW_HOST}/pr-${prNumber}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Remove old preview comment (running state)
            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            const body =
              marker +
              "\n## Preview Environment Stopped\n\n" +
              "The preview containers have been stopped and removed because the PR was closed.";

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

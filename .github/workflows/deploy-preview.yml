name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed, labeled, unlabeled]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

# Explicit permissions needed for Dependabot and fork PRs to post comments
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  run_backend_tests:
    name: Backend tests
    if: github.event.action != 'closed'
    uses: ./.github/workflows/backend-tests.yml
    secrets: inherit

  run_frontend_tests:
    name: Frontend tests
    if: github.event.action != 'closed'
    uses: ./.github/workflows/frontend-tests.yml
    secrets: inherit

  preview:
    if: >-
      github.event.action != 'closed' &&
      github.event.action != 'unlabeled' &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: kaya-sem-house
    environment: preview
    needs: [run_backend_tests, run_frontend_tests]

    steps:
      # We should not edit perms of this, if this breaks SSH into server and delete manually and let actions rebuild
      # - name: Clean up runner directories
      #  run: sudo chown -R $USER:$USER /opt/hostedtoolcache || true
      #  continue-on-error: true

      - name: Clean up workspace
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace alpine sh -c "chown -R $(id -u):$(id -g) /workspace"
        continue-on-error: true

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Docker availability
        run: |
          echo "Checking Docker..."
          docker info
          docker compose version

      - name: Generate env files (composite action)
        uses: ./.github/actions/generate-preview-env
        with:
          pr_number: ${{ github.event.pull_request.number }}
          project_name: ${{ vars.PROJECT_NAME }}
          preview_host: ${{ vars.PREVIEW_HOST }}
          db_user: ${{ secrets.PREVIEW_DB_USER }}
          db_password: ${{ secrets.PREVIEW_DB_PASSWORD }}
          db_name: ${{ secrets.PREVIEW_DB_NAME }}
          public_site_url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          garage_rpc_secret: ${{ secrets.GARAGE_RPC_SECRET }}
          garage_s3_access_key: ${{ secrets.GARAGE_S3_ACCESS_KEY }}
          garage_s3_secret_key: ${{ secrets.GARAGE_S3_SECRET_KEY }}
          garage_s3_bucket: media-${{ github.event.pull_request.number }}
          jwt_secret: ${{ secrets.JWT_SECRET }}
          api_key_404: ${{ secrets.API_KEY_404 }}

      - name: Ensure Traefik network exists
        run: docker network inspect traefik >/dev/null 2>&1 || docker network create traefik

      - name: Ensure preview Traefik is running
        run: |
          if [ -z "$(docker compose -f infra/traefik/docker-compose.yml ps -q traefik)" ]; then
            docker compose -f infra/traefik/docker-compose.yml up -d
          fi

      - name: Start preview stack
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          # Expose CI context to Docker for Codecov - needed for codecov bundle analyzer
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview \
            -f infra/preview/docker-compose.preview.yml up -d --build

      - name: Comment preview links (replace previous)
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ vars.PREVIEW_HOST }}
        with:
          script: |
            const marker = "<!-- preview-env -->";
            const prNumber = context.payload.pull_request.number;

            const previewUrl = `https://${process.env.PREVIEW_HOST}/pr-${prNumber}`;
            const docsUrl = `${previewUrl}/docs`;
            const apiUrl = `${previewUrl}/api`;

            // 1. Fetch all comments on the PR
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // 2. Delete previous preview comments (if any)
            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            // 3. Create fresh preview comment
            const body =
              marker +
              "\n## Preview Environment \n\n" +
              "- Frontend: [Open Preview](" + previewUrl + ")\n" +
              "- Docs: [Open Docs](" + docsUrl + ")\n" +
              "- API: [Open API](" + apiUrl + ")\n";

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  cleanup:
    if: >-
      (github.event.action == 'closed' &&
       contains(github.event.pull_request.labels.*.name, 'preview')) ||
      (github.event.action == 'unlabeled' &&
       github.event.label.name == 'preview')
    runs-on: kaya-sem-house
    environment: preview
    steps:
      - name: Clean up workspace
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace alpine sh -c "chown -R $(id -u):$(id -g) /workspace"
        continue-on-error: true

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate env files (composite action)
        uses: ./.github/actions/generate-preview-env
        with:
          pr_number: ${{ github.event.pull_request.number }}
          project_name: ${{ vars.PROJECT_NAME }}
          preview_host: ${{ vars.PREVIEW_HOST }}
          db_user: ${{ secrets.PREVIEW_DB_USER }}
          db_password: ${{ secrets.PREVIEW_DB_PASSWORD }}
          db_name: ${{ secrets.PREVIEW_DB_NAME }}
          public_site_url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          garage_rpc_secret: ${{ secrets.GARAGE_RPC_SECRET }}
          garage_s3_access_key: ${{ secrets.GARAGE_S3_ACCESS_KEY }}
          garage_s3_secret_key: ${{ secrets.GARAGE_S3_SECRET_KEY }}
          garage_s3_bucket: media
          jwt_secret: ${{ secrets.JWT_SECRET }}
          api_key_404: ${{ secrets.API_KEY_404 }}

      - name: Cleanup preview stack
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview \
            -f infra/preview/docker-compose.preview.yml down -v || true
          rm -f infra/preview/.env.preview
          rm -f .env
          echo "Preview stack stopped."

      - name: Comment preview stopped
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ vars.PREVIEW_HOST }}
        with:
          script: |
            const marker = "<!-- preview-env -->";
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${process.env.PREVIEW_HOST}/pr-${prNumber}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Remove old preview comment (running state)
            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            const body =
              marker +
              "\n## Preview Environment Stopped\n\n" +
              "The preview containers have been stopped and removed because the PR was closed.";

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

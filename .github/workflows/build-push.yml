name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            kayasem/${{ vars.PROJECT_NAME }}-backend:latest
            kayasem/${{ vars.PROJECT_NAME }}-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            "NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}"
            "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}/api"
          tags: |
            kayasem/${{ vars.PROJECT_NAME }}-frontend:latest
            kayasem/${{ vars.PROJECT_NAME }}-frontend:${{ github.sha }}

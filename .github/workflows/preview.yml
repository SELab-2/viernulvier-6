name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Generate preview env
        if: github.event.action != 'closed'
        run: |
          mkdir -p infra/preview
          echo "PREVIEW_NAME=pr-${{ github.event.pull_request.number }}" > infra/preview/.env.preview
          echo "COMPOSE_PROJECT_NAME=${PROJECT_NAME}-pr-${{ github.event.pull_request.number }}" >> infra/preview/.env.preview

      - name: Ensure Traefik network exists
        run: docker network inspect traefik >/dev/null 2>&1 || docker network create traefik

      - name: Ensure preview Traefik is running
        run: |
          if [ -z "$(docker ps -q -f name=traefik_preview)" ]; then
            docker compose -f infra/traefik/docker-compose.yml up -d
          fi

      - name: Start preview stack
        if: github.event.action != 'closed'
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview -f infra/preview/docker-compose.preview.yml up -d

      - name: Post preview URL comment
        if: github.event.action != 'closed'
        run: |
          PREVIEW_URL="http://${PREVIEW_HOST}/pr-${{ github.event.pull_request.number }}"
          echo "Preview URL: $PREVIEW_URL"
          gh pr comment ${{ github.event.pull_request.number }} --body "Preview for this PR is available at $PREVIEW_URL"

  cleanup:
    if: github.event.action == 'closed'
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Cleanup preview stack
        run: |
          if [ -f infra/preview/.env.preview ]; then
            docker compose --env-file .env --env-file infra/preview/.env.preview -f infra/preview/docker-compose.preview.yml down -v || true
          fi

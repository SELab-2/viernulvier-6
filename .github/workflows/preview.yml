name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    runs-on: self-hosted
    environment: preview

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check Docker availability
        run: |
          echo "Checking Docker..."
          docker info
          docker compose version

      - name: Generate root .env
        if: github.event.action != 'closed'
        run: |
          echo "PROJECT_NAME=${{ vars.PROJECT_NAME }}" > .env

      - name: Generate preview env
        if: github.event.action != 'closed'
        run: |
          mkdir -p infra/preview
          echo "PREVIEW_HOST=${{ vars.PREVIEW_HOST }}" > infra/preview/.env.preview
          echo "PREVIEW_NAME=pr-${{ github.event.pull_request.number }}" >> infra/preview/.env.preview
          echo "COMPOSE_PROJECT_NAME=${{ vars.PROJECT_NAME }}-preview-pr-${{ github.event.pull_request.number }}" >> infra/preview/.env.preview

          echo "PREVIEW_DB_USER=${{ secrets.PREVIEW_DB_USER }}" >> infra/preview/.env.preview
          echo "PREVIEW_DB_PASSWORD=${{ secrets.PREVIEW_DB_PASSWORD }}" >> infra/preview/.env.preview
          echo "PREVIEW_DB_NAME=${{ secrets.PREVIEW_DB_NAME }}" >> infra/preview/.env.preview

      - name: Ensure Traefik network exists
        run: |
          docker network inspect traefik >/dev/null 2>&1 || docker network create traefik

      - name: Ensure preview Traefik is running
        run: |
          if [ -z "$(docker ps -q -f name=traefik_preview)" ]; then
            docker compose -f infra/traefik/docker-compose.yml up -d
          fi

      - name: Start preview stack
        if: github.event.action != 'closed'
        run: |
          docker compose --env-file .env --env-file infra/preview/.env.preview \
            -f infra/preview/docker-compose.preview.yml up -d --build

      - name: Comment preview links
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ vars.PREVIEW_HOST }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `http://${process.env.PREVIEW_HOST}/pr-${prNumber}`;
            const apiUrl = `${previewUrl}/api`;

            const body =
              "## Preview Environment\n\n" +
              "- Frontend: [Open Preview](" + previewUrl + ")\n" +
              "- API: [Open API](" + apiUrl + ")\n";

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: self-hosted
    environment: preview
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Cleanup preview stack
        run: |
          if [ -f infra/preview/.env.preview ]; then
            docker compose --env-file .env --env-file infra/preview/.env.preview \
              -f infra/preview/docker-compose.preview.yml down -v || true
            rm -f infra/preview/.env.preview
          fi

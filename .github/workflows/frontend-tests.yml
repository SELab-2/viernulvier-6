name: Frontend Tests

on: workflow_call

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Clean up workspace
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Typecheck
        run: |
          cd frontend
          npm run typecheck

      - name: Run tests and generate coverage
        run: |
          cd frontend
          npm run test:coverage -- --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          # Codecov automatically merges backend and frontend coverage
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          files: frontend/junit.xml
          report_type: test_results

      - name: Clean up workspace
        if: always()
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true

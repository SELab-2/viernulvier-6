name: "Generate Production Env"
description: "Creates a .env file for production using inputs (including secrets)"
inputs:
  project_name:
    description: "Project name"
    required: true
  prod_host:
    description: "Host domain"
    required: true
  db_user:
    description: "Database user"
    required: true
  db_password:
    description: "Database password"
    required: true
  db_name:
    description: "Database name"
    required: true
  public_site_url:
    description: "Public site url"
    required: true
  garage_rpc_secret:
    description: "Garage RPC secret"
    required: true
  garage_s3_access_key:
    description: "Garage S3 access key"
    required: true
  garage_s3_secret_key:
    description: "Garage S3 secret key"
    required: true
  garage_s3_bucket:
    description: "Garage S3 bucket name"
  jwt_secret:
    description: "Backend JWT secret"
    required: true
  api_key_404:
    description: "API key for the viernulvier API"
    required: true
runs:
  using: "composite"
  steps:
    - name: Create production .env
      shell: bash
      env:
        COMPOSE_PROJECT_NAME: "${{ inputs.project_name }}"
        PROD_HOST: "${{ inputs.prod_host }}"
        PROD_DB_USER: "${{ inputs.db_user }}"
        PROD_DB_PASSWORD: "${{ inputs.db_password }}"
        PROD_DB_NAME: "${{ inputs.db_name }}"
        PROD_SITE_URL: "${{ inputs.public_site_url }}"
        GARAGE_RPC_SECRET: "${{ inputs.garage_rpc_secret }}"
        GARAGE_S3_ACCESS_KEY: "${{ inputs.garage_s3_access_key }}"
        GARAGE_S3_SECRET_KEY: "${{ inputs.garage_s3_secret_key }}"
        GARAGE_S3_BUCKET: "${{ inputs.garage_s3_bucket }}"
        PROD_API_KEY_404: "${{ inputs.api_key_404 }}"
        PROD_JWT_SECRET: "${{ inputs.jwt_secret }}"

      run: |
        PROD_DATABASE_URL="postgres://${PROD_DB_USER}:${PROD_DB_PASSWORD}@${COMPOSE_PROJECT_NAME}-database:5432/${PROD_DB_NAME}"

        cat > .env <<EOF
        COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
        PROD_HOST=$PROD_HOST
        PROD_DB_USER=$PROD_DB_USER
        PROD_DB_PASSWORD=$PROD_DB_PASSWORD
        PROD_DB_NAME=$PROD_DB_NAME
        PROD_DATABASE_URL=$PROD_DATABASE_URL
        PROD_JWT_SECRET=$PROD_JWT_SECRET
        NEXT_PUBLIC_SITE_URL=$PROD_SITE_URL
        PROD_API_KEY_404=$PROD_API_KEY_404
        GARAGE_RPC_SECRET=$GARAGE_RPC_SECRET
        GARAGE_S3_ACCESS_KEY=$GARAGE_S3_ACCESS_KEY
        GARAGE_S3_SECRET_KEY=$GARAGE_S3_SECRET_KEY
        GARAGE_S3_BUCKET=$GARAGE_S3_BUCKET
        EOF

        echo "Production .env generated."

name: "Generate Preview Env"
description: "Generate .env and .env.preview files deterministically"

inputs:
  pr_number:
    description: "Pull request number"
    required: true
  project_name:
    description: "Project name"
    required: true
  preview_host:
    description: "Preview host"
    required: true
  db_user:
    required: true
  db_password:
    required: true
  db_name:
    required: true
  public_site_url:
    required: true
  garage_rpc_secret:
    description: "Garage RPC secret"
    required: true
  garage_s3_access_key:
    description: "Garage S3 access key"
    required: true
  garage_s3_secret_key:
    description: "Garage S3 secret key"
    required: true
  garage_s3_bucket:
    description: "Garage S3 bucket name"
  jwt_secret:
    required: true
  api_key_404:
    required: true
  admin_email:
    description: "Admin email for bootstrap"
    required: true
  admin_password:
    description: "Admin password for bootstrap (required on first startup)"
    required: true
  max_upload_size_mib:
    description: "Max upload size in MiB for presigned S3 URLs (default 50)"
    required: false
    default: "50"

runs:
  using: "composite"
  steps:
    - name: Generate root .env
      shell: bash
      run: |
        echo "PROJECT_NAME=${{ inputs.project_name }}" > .env
        echo "Generated .env"

    - name: Generate preview env file
      shell: bash
      env:
        PREVIEW_HOST: "${{ inputs.preview_host }}"
        PREVIEW_NAME: "pr-${{ inputs.pr_number }}"
        COMPOSE_PROJECT_NAME: "${{ inputs.project_name }}-preview-pr-${{ inputs.pr_number }}"
        PREVIEW_DB_USER: "${{ inputs.db_user }}"
        PREVIEW_DB_PASSWORD: "${{ inputs.db_password }}"
        PREVIEW_DB_NAME: "${{ inputs.db_name }}"
        PREVIEW_SITE_URL: "${{ inputs.public_site_url }}"
        GARAGE_RPC_SECRET: "${{ inputs.garage_rpc_secret }}"
        GARAGE_S3_ACCESS_KEY: "${{ inputs.garage_s3_access_key }}"
        GARAGE_S3_SECRET_KEY: "${{ inputs.garage_s3_secret_key }}"
        GARAGE_S3_BUCKET: "${{ inputs.garage_s3_bucket }}"
        PREVIEW_API_KEY_404: "${{ inputs.api_key_404 }}"
        PREVIEW_JWT_SECRET: "${{ inputs.jwt_secret }}"
        PREVIEW_ADMIN_EMAIL: "${{ inputs.admin_email }}"
        PREVIEW_ADMIN_PASSWORD: "${{ inputs.admin_password }}"
        MAX_UPLOAD_SIZE_MIB: "${{ inputs.max_upload_size_mib }}"

      run: |
        mkdir -p infra/preview

        PREVIEW_DATABASE_URL="postgres://${PREVIEW_DB_USER}:${PREVIEW_DB_PASSWORD}@${COMPOSE_PROJECT_NAME}-database:5432/${PREVIEW_DB_NAME}"

        cat > infra/preview/.env.preview <<EOF
        PREVIEW_HOST=$PREVIEW_HOST
        PREVIEW_NAME=$PREVIEW_NAME
        COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
        PREVIEW_DB_USER=$PREVIEW_DB_USER
        PREVIEW_DB_PASSWORD=$PREVIEW_DB_PASSWORD
        PREVIEW_DB_NAME=$PREVIEW_DB_NAME
        PREVIEW_DATABASE_URL=$PREVIEW_DATABASE_URL
        PREVIEW_JWT_SECRET=$PREVIEW_JWT_SECRET

        GARAGE_RPC_SECRET=$GARAGE_RPC_SECRET
        GARAGE_S3_ACCESS_KEY=$GARAGE_S3_ACCESS_KEY
        GARAGE_S3_SECRET_KEY=$GARAGE_S3_SECRET_KEY
        GARAGE_S3_BUCKET=$GARAGE_S3_BUCKET

        PREVIEW_API_KEY_404=$PREVIEW_API_KEY_404
        PREVIEW_ADMIN_EMAIL=$PREVIEW_ADMIN_EMAIL
        PREVIEW_ADMIN_PASSWORD=$PREVIEW_ADMIN_PASSWORD
        MAX_UPLOAD_SIZE_MIB=$MAX_UPLOAD_SIZE_MIB
        NEXT_PUBLIC_SITE_URL=$PREVIEW_SITE_URL
        EOF

        echo "Generated infra/preview/.env.preview"

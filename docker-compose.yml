services:
  database:
    image: postgres:18
    container_name: database
    restart: always
    environment:
      POSTGRES_USER: dev_archief
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: archief
    ports:
      - "5432:5432"
    volumes:
      - archief_data:/var/lib/postgresql/18/docker
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_archief -d archief"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_archief
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
    ports:
      - "3001:3000"
    networks:
      - app_network

volumes:
  archief_data:

networks:
  app_network:
    driver: bridge

[package]
name = "viernulvier_api"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "viernulvier_api"
path = "src/main.rs"

[lints.clippy]
unused_async = "warn"

[workspace]
members = ["database", "api"]

[dependencies]
database = { path = "database" }
api = { path = "api" }

axum = "0.8.8"
dotenvy = "0.15.7"
thiserror = "2.0.17"
serde_json = "1.0.149"
serde = {version= "1.0.228", features = ["derive"]}
tracing = { version = "=0.1", default-features = false }
tracing-subscriber = { version = "=0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
] }
tokio = { version = "1.49.0", default-features = false, features = [
    "rt-multi-thread",
    "signal",
    "process",
] }
tower-http = { version = "0.6.6", default-features = false, features = [
    "trace",
    "compression-zstd",
    "cors",
] }
uuid = { version = "1", features = ["v7", "serde"] }
o2o = "0.5.4"
utoipa = { version = "5.4.0", features = ["uuid", "axum_extras"] }
utoipa-swagger-ui = { version = "9.0.2", features = ["axum"] }
utoipa-axum = "0.2.0"

[package]
name = "api"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "api"
path = "src/lib.rs"

[dependencies]
database = { path = "../database" }

tracing = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

ormlite = { version = "0.24.3", features = ["sqlite"], default-features = false }
reqwest = { version = "0.13.2", features = ["json", "query"] }
futures = "0.3.32"
slug = "0.1.6"

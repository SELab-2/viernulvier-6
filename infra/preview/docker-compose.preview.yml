services:
  frontend:
    build:
      context: ../../frontend
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_API_URL=http://api:80/api
        - PREVIEW_NAME=${PREVIEW_NAME}
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_URL: http://api:80/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}.rule=PathPrefix(`/${PREVIEW_NAME}`)"
      - "traefik.http.routers.${PREVIEW_NAME}.entrypoints=web"
      - "traefik.http.middlewares.${PREVIEW_NAME}-strip.stripprefix.prefixes=/${PREVIEW_NAME}"
      - "traefik.http.routers.${PREVIEW_NAME}.middlewares=${PREVIEW_NAME}-strip"
      - "traefik.http.services.${PREVIEW_NAME}.loadbalancer.server.port=3000"
    networks:
      - traefik

  api:
    image: nginxdemos/hello # TODO: replace by the proper API, this is just for testing purposes
    container_name: ${COMPOSE_PROJECT_NAME}_api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}-api.rule=PathPrefix(`/${PREVIEW_NAME}/api`)"
      - "traefik.http.routers.${PREVIEW_NAME}-api.entrypoints=web"
      - "traefik.http.services.${PREVIEW_NAME}-api.loadbalancer.server.port=80"
    networks:
      - traefik

  db:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME}_db
    environment:
      POSTGRES_USER: ${PREVIEW_DB_USER}
      POSTGRES_PASSWORD: ${PREVIEW_DB_PASSWORD}
      POSTGRES_DB: ${PREVIEW_DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - internal

volumes:
  db_data:

networks:
  traefik:
    external: true
  internal:
    driver: bridge

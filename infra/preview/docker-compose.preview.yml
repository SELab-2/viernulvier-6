services:
  frontend:
    build:
      context: ../../frontend
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_API_URL=http://api:80/api
        - PREVIEW_NAME=${PREVIEW_NAME}
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_URL: http://api:80/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/${PREVIEW_NAME}`) && !PathPrefix(`/${PREVIEW_NAME}/docs`) && !PathPrefix(`/${PREVIEW_NAME}/api`)"
      - "traefik.http.routers.${PREVIEW_NAME}.entrypoints=websecure"
      - "traefik.http.services.${PREVIEW_NAME}.loadbalancer.server.port=3000"
      - "traefik.http.routers.${PREVIEW_NAME}.priority=1"
      - "traefik.http.routers.${PREVIEW_NAME}.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal

  docs:
    build:
      context: ../../docs
    container_name: ${COMPOSE_PROJECT_NAME}_docs
    labels:
      - "traefik.enable=true"
      # Route for /{preview-name}/docs (for PR previews) - higher priority than frontend
      - "traefik.http.routers.${PREVIEW_NAME}-docs.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/${PREVIEW_NAME}/docs`)"
      - "traefik.http.routers.${PREVIEW_NAME}-docs.entrypoints=websecure"
      - "traefik.http.services.${PREVIEW_NAME}-docs.loadbalancer.server.port=3000"
      - "traefik.http.routers.${PREVIEW_NAME}-docs.priority=10"
      - "traefik.http.routers.${PREVIEW_NAME}-docs.tls.certresolver=letsencrypt"
      # Route for /docs (for local development)
      - "traefik.http.routers.docs-local.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/docs`)"
      - "traefik.http.routers.docs-local.entrypoints=websecure"
      - "traefik.http.routers.docs-local.service=${PREVIEW_NAME}-docs"
      - "traefik.http.routers.docs-local.priority=10"
      - "traefik.http.routers.docs-local.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal

  api:
    build:
      context: ../../backend
    container_name: ${COMPOSE_PROJECT_NAME}_api
    environment:
      DATABASE_URL: postgres://${PREVIEW_DB_USER}:${PREVIEW_DB_PASSWORD}@${COMPOSE_PROJECT_NAME}_db:5432/${PREVIEW_DB_NAME}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}-api.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/${PREVIEW_NAME}/api`)"
      - "traefik.http.middlewares.${PREVIEW_NAME}-api-strip.stripprefix.prefixes=/${PREVIEW_NAME}/api"
      - "traefik.http.routers.${PREVIEW_NAME}-api.middlewares=${PREVIEW_NAME}-api-strip"
      - "traefik.http.routers.${PREVIEW_NAME}-api.entrypoints=websecure"
      - "traefik.http.services.${PREVIEW_NAME}-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.${PREVIEW_NAME}-api.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal

  db:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME}_db
    environment:
      POSTGRES_USER: ${PREVIEW_DB_USER}
      POSTGRES_PASSWORD: ${PREVIEW_DB_PASSWORD}
      POSTGRES_DB: ${PREVIEW_DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - internal

volumes:
  db_data:

networks:
  traefik:
    external: true
  internal:
    driver: bridge

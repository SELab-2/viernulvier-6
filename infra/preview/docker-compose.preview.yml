services:
  frontend:
    build:
      context: ../../frontend
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_SITE_URL}/${PREVIEW_NAME}/api
        - PREVIEW_NAME=${PREVIEW_NAME}
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_SITE_URL}/${PREVIEW_NAME}/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/${PREVIEW_NAME}`)"
      - "traefik.http.routers.${PREVIEW_NAME}.entrypoints=websecure"
      #- "traefik.http.middlewares.${PREVIEW_NAME}-strip.stripprefix.prefixes=/${PREVIEW_NAME}"
      #- "traefik.http.routers.${PREVIEW_NAME}.middlewares=${PREVIEW_NAME}-strip"
      - "traefik.http.services.${PREVIEW_NAME}.loadbalancer.server.port=3000"
      - "traefik.http.routers.${PREVIEW_NAME}.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal
    restart: unless-stopped

  api:
    build:
      context: ../../backend
    container_name: ${COMPOSE_PROJECT_NAME}_api
    environment:
      DATABASE_URL: postgres://${PREVIEW_DB_USER}:${PREVIEW_DB_PASSWORD}@${COMPOSE_PROJECT_NAME}_db:5432/${PREVIEW_DB_NAME}
      S3_ENDPOINT: http://${COMPOSE_PROJECT_NAME}_garage:3900
      S3_REGION: garage
      S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      S3_BUCKET: ${GARAGE_S3_BUCKET}
      JWT_SECRET: ${PREVIEW_JWT_SECRET}
      API_KEY_404: ${PREVIEW_API_KEY_404}
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PREVIEW_NAME}-api.rule=Host(`${PREVIEW_HOST}`) && PathPrefix(`/${PREVIEW_NAME}/api`)"
      - "traefik.http.middlewares.${PREVIEW_NAME}-api-strip.stripprefix.prefixes=/${PREVIEW_NAME}/api"
      - "traefik.http.routers.${PREVIEW_NAME}-api.middlewares=${PREVIEW_NAME}-api-strip"
      - "traefik.http.routers.${PREVIEW_NAME}-api.entrypoints=websecure"
      - "traefik.http.services.${PREVIEW_NAME}-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.${PREVIEW_NAME}-api.tls.certresolver=letsencrypt"
    networks:
      - traefik
      - internal
    restart: unless-stopped

  db:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME}_db
    environment:
      POSTGRES_USER: ${PREVIEW_DB_USER}
      POSTGRES_PASSWORD: ${PREVIEW_DB_PASSWORD}
      POSTGRES_DB: ${PREVIEW_DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PREVIEW_DB_USER} -d ${PREVIEW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: ${COMPOSE_PROJECT_NAME}_garage
    restart: unless-stopped
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      - internal

  garage-init:
    image: amazon/aws-cli:latest
    container_name: ${COMPOSE_PROJECT_NAME}_garage_init
    environment:
      - AWS_ACCESS_KEY_ID=${GARAGE_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${GARAGE_S3_SECRET_KEY}
      - AWS_DEFAULT_REGION=garage
    networks:
      - internal
    depends_on:
      garage:
        condition: service_started
    entrypoint: >
      sh -c "
      sleep 5 &&
      aws --endpoint-url http://garage:3900 s3 mb s3://${GARAGE_S3_BUCKET} || true
      "

volumes:
  db_data:
  garage_meta:
  garage_data:

networks:
  traefik:
    external: true
  internal:
    driver: bridge

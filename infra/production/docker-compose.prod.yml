services:
  backend:
    image: kayasem/${COMPOSE_PROJECT_NAME}-backend:latest
    container_name: ${COMPOSE_PROJECT_NAME}_backend
    restart: always
    environment:
      DATABASE_URL: ${PROD_DATABASE_URL}
      JWT_SECRET: ${PROD_JWT_SECRET}
      API_KEY_404: ${PROD_API_KEY_404}
      LOG_LEVEL: ${PROD_LOG_LEVEL}
      S3_ENDPOINT: http://${COMPOSE_PROJECT_NAME}_garage:3900
      S3_REGION: garage
      S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      S3_BUCKET: ${GARAGE_S3_BUCKET}
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.main-api.rule=Host(`${PROD_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.main-api.middlewares=api-strip"
      - "traefik.http.routers.main-api.entrypoints=websecure"
      - "traefik.http.services.main-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.main-api.priority=10"
      - "traefik.http.routers.main-api.tls.certresolver=letsencrypt"

  frontend:
    image: kayasem/${COMPOSE_PROJECT_NAME}-frontend:latest
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    restart: always
    networks:
      - app_network
      - traefik
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_SITE_URL}/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.main.rule=Host(`${PROD_HOST}`) && PathPrefix(`/`)"
      - "traefik.http.routers.main.entrypoints=websecure"
      - "traefik.http.services.main.loadbalancer.server.port=3000"
      - "traefik.http.routers.main.priority=1"
      - "traefik.http.routers.main.tls.certresolver=letsencrypt"

  database:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME}_database
    restart: always
    environment:
      POSTGRES_USER: ${PROD_DB_USER}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
      POSTGRES_DB: ${PROD_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: ${COMPOSE_PROJECT_NAME}_garage
    restart: always
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      - app_network

  garage-init:
    image: amazon/aws-cli:latest
    container_name: ${COMPOSE_PROJECT_NAME}_garage_init
    environment:
      - AWS_ACCESS_KEY_ID=${GARAGE_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${GARAGE_S3_SECRET_KEY}
      - AWS_DEFAULT_REGION=garage
    networks:
      - app_network
    depends_on:
      garage:
        condition: service_started
    entrypoint: >
      sh -c "
      sleep 5 &&
      aws --endpoint-url http://${COMPOSE_PROJECT_NAME}_garage:3900 s3 mb s3://${GARAGE_S3_BUCKET} || true
      "

volumes:
  postgres_data:
  garage_meta:
  garage_data:

networks:
  app_network:
    driver: bridge
  traefik:
    external: true

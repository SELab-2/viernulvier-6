metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
# GARAGE_RPC_SECRET env var wordt automatisch gebruikt

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
# Empty root_domain enables path-style access (bucket in URL path)
root_domain = ""

[s3_web]
bind_addr = "[::]:3902"
# Empty root_domain enables path-style access (bucket in URL path)
root_domain = ""

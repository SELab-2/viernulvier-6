services:
  backend:
    image: kayasem/${COMPOSE_PROJECT_NAME}_backend:latest
    container_name: ${COMPOSE_PROJECT_NAME}_backend
    restart: always
    environment:
      DATABASE_URL: ${PROD_DATABASE_URL}
      LOG_LEVEL: ${PROD_LOG_LEVEL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.main-api.rule=PathPrefix(`/main/api`)"
      - "traefik.http.routers.main-api.entrypoints=web"
      - "traefik.http.services.main-api.loadbalancer.server.port=3000"

  frontend:
    image: kayasem/${COMPOSE_PROJECT_NAME}_frontend:latest
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    restart: always
    networks:
      - app_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.main.rule=PathPrefix(`/main`)"
      - "traefik.http.routers.main.entrypoints=web"
      - "traefik.http.middlewares.main-strip.stripprefix.prefixes=/main"
      - "traefik.http.routers.main.middlewares=main-strip"
      - "traefik.http.services.main.loadbalancer.server.port=80"

  database:
    image: postgres:16
    container_name: ${COMPOSE_PROJECT_NAME}_database
    restart: always
    environment:
      POSTGRES_USER: ${PROD_DB_USER}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
      POSTGRES_DB: ${PROD_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  app_network:
    external: true
  traefik:
    external: true
